<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polash Steel House | Premium Fabrication</title>
    
    <!-- Google Fonts-->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        :root {
            --primary: #ff8c00; 
            --secondary: #00d4ff; 
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glow: 0 0 15px rgba(255, 140, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- Stylish Navbar --- */
        nav {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 140, 0, 0.3);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            letter-spacing: 2px;
        }

        .logo span { color: var(--primary); text-shadow: var(--glow); }

        .call-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .call-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: var(--glow);
        }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, rgba(255, 140, 0, 0.1) 0%, transparent 70%), 
                        url('https://unsplash.com');
            background-size: cover;
            background-position: center;
        }

        .hero-content h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .hero-content h1 span {
            background: linear-gradient(90deg, #ff8c00, #ffed00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.4));
        }

        .hero-content p { font-size: 1.1rem; color: #ccc; margin-bottom: 30px; }

        /* --- Stylish Buttons --- */
        .btn-box { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        .btn-style {
            padding: 15px 35px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            transition: 0.5s;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-style:hover {
            background: var(--primary);
            color: #000 !important;
            box-shadow: var(--glow);
            transform: translateY(-5px);
        }

        .wa-btn { background: #25d366; border: none; }
        .wa-btn:hover { background: #fff; color: #25d366 !important; box-shadow: 0 0 20px #25d366; }

        /* --- Map Area --- */
        .map-section { padding: 100px 8%; text-align: center; }
        .map-section h2 { font-family: 'Orbitron', sans-serif; color: var(--primary); margin-bottom: 40px; letter-spacing: 2px; }
        
        .map-wrapper {
            border: 2px solid rgba(255, 140, 0, 0.3);
            padding: 10px;
            border-radius: 25px;
            background: var(--glass);
            overflow: hidden;
        }

        iframe { border-radius: 15px; width: 100%; height: 450px; border: none; filter: contrast(1.1); }

        /* --- Floating WhatsApp --- */
        .wa-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: #25d366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            z-index: 1000;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- Footer & Tousif Glow --- */
        footer {
            background: #000;
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid #111;
        }

        .dev-credit {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #666;
        }

        .dev-credit span {
            font-family: 'Dancing Script', cursive;
            color: var(--secondary);
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--secondary), 0 0 20px var(--secondary);
            margin-left: 8px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .btn-box { flex-direction: column; width: 100%; padding: 0 20px; }
            .btn-style { width: 100%; justify-content: center; }
            nav { padding: 15px 5%; }
            .logo { font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">Polash <span>Steel House</span></div>
        <a href="tel:01752855597" class="call-btn">
            <i class="fas fa-phone-alt"></i> Call Now
        </a>
    </nav>

    <!-- Hero -->
    <section class="hero" id="home">
        <div class="hero-content">
            <h1><span>STRENGTH</span> & STYLE</h1>
            <p>Premium Metal Works & Custom Steel Fabrication Specialists</p>
            <div class="btn-box">
                <a href="#location" class="btn-style">
                    <i class="fas fa-location-dot"></i> Find Us
                </a>
                <!-- WhatsApp বাটন আইকনসহ -->
                <a href="https://wa.me/" class="btn-style wa-btn" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp Chat
                </a>
            </div>
        </div>
    </section>

    <!-- Map Section -->
    <section class="map-section" id="location">
        <h2>OUR LOCATION</h2>
        <div class="map-wrapper">
            <!-- Map Section -->
<section class="map-section" id="location">
    <h2>OUR LOCATION</h2>
    <div class="map-wrapper" style="padding: 50px 20px;">
        <p style="margin-bottom: 20px; color: #ccc;">Find us on the map to visit our workshop.</p>
        
        <!-- ম্যাপ ওপেন করার বাটন -->
        <a href="https://maps.app.goo.gl/VMDSQ8Xcnk8MN2wE9" class="btn-style" target="_blank" style="display: inline-flex; margin: 0 auto;">
            <i class="fas fa-location-dot"></i> Click Here to View Location
        </a>
    </div>
</section>


    <!-- Floating WhatsApp -->
    <a href="https://wa.me" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Footer -->
    <footer>
        <p style="color: #888;">&copy; 2026 Polash Steel House. All Rights Reserved.</p>
        <p class="dev-credit">Developed by <span>Tousif</span></p>
    </footer>

</body>
</html>
